<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        /*
        ==========================================================
        FLOWBASE — SVG HANDWRITING DRAW + FILL
        ==========================================================
      
        HOW TO USE
        ----------
        1. Wrap your SVG letters in an element with:
           text-handwrite="your-name"
      
        2. Each letter should be its own SVG inside that wrapper.
      
        3. Example:
           <div text-handwrite="404">
             <svg>...</svg>
             <svg>...</svg>
             <svg>...</svg>
           </div>
      
        WHAT THIS SCRIPT DOES
        ---------------------
        - Hides the original SVGs at runtime
        - Creates animated SVG clones on top
        - Draws the stroke first
        - Fades the fill in shortly after
        - Can run on scroll into view
        - Can redraw letters on hover
        - Can also be configured to ONLY run on hover
      
        NOTE
        ----
        This works best when each SVG letter contains clean path data.
        For the most "handwritten" look, use simple paths and avoid
        overly complex compound shapes where possible.
        */

        const settings = {
            /*
            ----------------------------------------------------------
            TARGETING
            ----------------------------------------------------------
            Match this to:
            text-handwrite="404"
            */
            target: "404",

            /*
            ----------------------------------------------------------
            STROKE STYLING
            ----------------------------------------------------------
            */
            strokeColor: "#000",
            strokeWidth: 2.5,
            lineCap: "round",
            lineJoin: "round",

            /*
            ----------------------------------------------------------
            FILL STYLING
            ----------------------------------------------------------
            */
            fillColor: "#000",
            fillDelay: 1.25,     // seconds after timeline begins
            fillDuration: 0.35,

            /*
            ----------------------------------------------------------
            DRAW TIMING
            ----------------------------------------------------------
            drawDuration = total stroke draw time per letter
            drawEase     = easing used for the stroke draw
            strokeDelay  = delay before the stroke starts
            */
            drawDuration: 2,
            drawEase: "power2.out",
            strokeDelay: 0,

            /*
            ----------------------------------------------------------
            INITIAL SEQUENCE
            ----------------------------------------------------------
            Stagger between each letter on the first run
            */
            stagger: 0.12,

            /*
            ----------------------------------------------------------
            SCROLL TRIGGER
            ----------------------------------------------------------
            Used when runOnScroll = true
            */
            runOnScroll: true,
            rootMargin: "0px 0px -15% 0px",

            /*
            ----------------------------------------------------------
            HOVER OPTIONS
            ----------------------------------------------------------
            runOnHover:
              - true  = do NOT auto-run on scroll
              - letters only animate when hovered
        
            redrawOnHover:
              - true  = if the initial animation already ran,
                        hovering a letter redraws that letter
        
            You would usually use ONE of these approaches:
              A) runOnScroll: true + redrawOnHover: true
              B) runOnHover: true
            */
            runOnHover: false,
            redrawOnHover: false,

            /*
            Small safety delay to stop hover spamming
            */
            hoverRedrawMinGap: 150
        };

        const wrapper = document.querySelector(`[text-handwrite="${settings.target}"]`);
        if (!wrapper) return;

        const svgs = Array.from(wrapper.querySelectorAll("svg"));
        if (!svgs.length) return;

        // Prevent running twice
        if (wrapper.dataset.handwriteReady === "true") return;
        wrapper.dataset.handwriteReady = "true";

        const svgNS = "http://www.w3.org/2000/svg";
        const letters = [];

        /*
        ==========================================================
        BUILD EACH LETTER
        ==========================================================
        Creates an animated overlay version for each SVG
        */
        function buildLetter(svg, index) {
            const originalPaths = Array.from(svg.querySelectorAll("path"));
            if (!originalPaths.length) return null;

            // Use the SVG's parent as the positioning host when possible
            const host = svg.parentElement || svg;
            const computed = window.getComputedStyle(host);

            if (computed.position === "static") {
                host.style.position = "relative";
            }

            // Keep original visible in Designer, but hide at runtime
            svg.style.opacity = "0";

            // Create overlay SVG
            const overlay = document.createElementNS(svgNS, "svg");
            overlay.setAttribute("viewBox", svg.getAttribute("viewBox") || "0 0 100 100");
            overlay.setAttribute("width", svg.getAttribute("width") || "100%");
            overlay.setAttribute("height", svg.getAttribute("height") || "100%");
            overlay.setAttribute(
                "preserveAspectRatio",
                svg.getAttribute("preserveAspectRatio") || "xMidYMid meet"
            );

            overlay.style.position = "absolute";
            overlay.style.inset = "0";
            overlay.style.width = "100%";
            overlay.style.height = "100%";
            overlay.style.pointerEvents = "auto";
            overlay.style.overflow = "visible";

            // Separate groups for fill and stroke
            const fillGroup = document.createElementNS(svgNS, "g");
            const strokeGroup = document.createElementNS(svgNS, "g");

            overlay.appendChild(fillGroup);
            overlay.appendChild(strokeGroup);
            host.appendChild(overlay);

            const fillPaths = [];
            const strokePaths = [];
            let longestLength = 0;

            // Duplicate every path:
            // - one for fill
            // - one for stroke draw
            originalPaths.forEach((path) => {
                // Fill clone
                const fillClone = path.cloneNode(true);
                fillClone.setAttribute("fill", settings.fillColor);
                fillClone.setAttribute("stroke", "none");
                fillClone.style.opacity = "0";
                fillGroup.appendChild(fillClone);
                fillPaths.push(fillClone);

                // Stroke clone
                const strokeClone = path.cloneNode(true);
                strokeClone.setAttribute("fill", "none");
                strokeClone.setAttribute("stroke", settings.strokeColor);
                strokeClone.setAttribute("stroke-width", settings.strokeWidth);
                strokeClone.setAttribute("stroke-linecap", settings.lineCap);
                strokeClone.setAttribute("stroke-linejoin", settings.lineJoin);

                let length = 0;
                try {
                    length = strokeClone.getTotalLength();
                } catch (error) {
                    return;
                }

                longestLength = Math.max(longestLength, length);

                // Hide stroke initially so GSAP can draw it in
                strokeClone.style.strokeDasharray = length + "px";
                strokeClone.style.strokeDashoffset = length + "px";

                strokeGroup.appendChild(strokeClone);
                strokePaths.push({
                    el: strokeClone,
                    length: length
                });
            });

            if (!strokePaths.length) return null;

            const drawDuration = settings.drawDuration;

            const letter = {
                index,
                svg,
                host,
                overlay,
                fillPaths,
                strokePaths,
                drawDuration,
                longestLength,
                lastHoverTime: 0,
                tl: null
            };

            /*
            ----------------------------------------------------------
            RESET LETTER
            ----------------------------------------------------------
            Returns the letter to its hidden pre-animation state
            */
            function resetLetter() {
                letter.fillPaths.forEach((path) => {
                    path.style.opacity = "0";
                });

                letter.strokePaths.forEach(({ el, length }) => {
                    el.style.strokeDasharray = length + "px";
                    el.style.strokeDashoffset = length + "px";
                });
            }

            /*
            ----------------------------------------------------------
            PLAY LETTER
            ----------------------------------------------------------
            Draws the stroke and then fades in the fill
            */
            function playLetter() {
                if (letter.tl) {
                    letter.tl.kill();
                }

                resetLetter();

                const tl = gsap.timeline();

                // Draw all stroke paths at the same time
                // Duration is normalized so long and short paths
                // feel visually consistent within the same letter
                letter.strokePaths.forEach(({ el, length }) => {
                    const pathDuration = letter.drawDuration * (length / letter.longestLength);

                    tl.to(el, {
                        strokeDashoffset: 0,
                        duration: pathDuration,
                        ease: settings.drawEase
                    }, settings.strokeDelay);
                });

                // Fade fill in after a short delay
                tl.to(letter.fillPaths, {
                    opacity: 1,
                    duration: settings.fillDuration,
                    ease: "power2.out",
                    stagger: 0
                }, settings.fillDelay);

                letter.tl = tl;
                return tl;
            }

            letter.resetLetter = resetLetter;
            letter.playLetter = playLetter;

            /*
            ----------------------------------------------------------
            HOVER BEHAVIOUR
            ----------------------------------------------------------
            - If runOnHover is true:
              hovering always plays the letter animation
        
            - If redrawOnHover is true:
              hovering redraws a letter after initial play
            */
            overlay.addEventListener("mouseenter", () => {
                const now = Date.now();
                if (now - letter.lastHoverTime < settings.hoverRedrawMinGap) return;
                letter.lastHoverTime = now;

                if (settings.runOnHover || settings.redrawOnHover) {
                    letter.playLetter();
                }
            });

            return letter;
        }

        // Build all letters
        svgs.forEach((svg, index) => {
            const letter = buildLetter(svg, index);
            if (letter) letters.push(letter);
        });

        if (!letters.length) return;

        // Reset all letters initially
        letters.forEach((letter) => {
            letter.resetLetter();
        });

        /*
        ==========================================================
        INITIAL PLAY
        ==========================================================
        Runs once when the wrapper enters the viewport
        */
        let hasPlayedInitial = false;

        function playInitialSequence() {
            if (hasPlayedInitial) return;
            hasPlayedInitial = true;

            const master = gsap.timeline();

            letters.forEach((letter, index) => {
                master.add(letter.playLetter(), index * settings.stagger);
            });
        }

        /*
        ==========================================================
        START LOGIC
        ==========================================================
        - If runOnHover is true:
          do not auto-play on scroll
      
        - Otherwise:
          play once when scrolled into view
        */
        if (!settings.runOnHover && settings.runOnScroll) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        playInitialSequence();
                        observer.disconnect();
                    }
                });
            }, {
                threshold: 0,
                root: null,
                rootMargin: settings.rootMargin
            });

            observer.observe(wrapper);
        }
    });
</script>
